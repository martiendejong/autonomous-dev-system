name: Secret Scanning

on:
  pull_request:
  push:
    branches: [master, main, develop]

jobs:
  secret-scan:
    name: Scan for Secrets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for comprehensive scanning

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: Check for hardcoded credentials
        run: |
          echo "Scanning for common secret patterns..."

          # Hardcoded passwords in .NET BCrypt calls
          if grep -rE 'HashPassword\("[^"]+"\)' --include="*.cs" .; then
            echo "ERROR: Found hardcoded password in HashPassword() call"
            exit 1
          fi

          # API keys in config/source (broad)
          if grep -rE "api[_-]?key\s*[=:]\s*['\"][A-Za-z0-9_-]{20,}['\"]" --include="*.json" --include="*.cs" --include="*.ts" --include="*.js" --include="*.py" .; then
            echo "ERROR: Found hardcoded API key"
            exit 1
          fi

          # Connection strings with embedded passwords in committed configs
          if grep -rE "Password\s*=\s*[^;$'\"]+" --include="appsettings*.json" .; then
            echo "ERROR: Found password in appsettings*.json"
            exit 1
          fi

          # Google OAuth secrets
          if grep -rE "GOCSPX-[A-Za-z0-9_-]+" .; then
            echo "ERROR: Found Google OAuth secret"
            exit 1
          fi

          # AWS access keys
          if grep -rE "AKIA[0-9A-Z]{16}" .; then
            echo "ERROR: Found AWS access key"
            exit 1
          fi

          # GitHub personal access tokens
          if grep -rE "ghp_[A-Za-z0-9]{36}" .; then
            echo "ERROR: Found GitHub personal access token"
            exit 1
          fi

          echo "No obvious secrets detected"

      - name: Verify gitignore effectiveness
        run: |
          echo "Checking if sensitive files are properly ignored..."

          if git ls-files | grep -E "appsettings\.(Production|production)\.json$"; then
            echo "ERROR: appsettings.Production.json is tracked by git"
            exit 1
          fi

          if git ls-files | grep -E "^\.env$|/\.env$"; then
            echo "ERROR: .env file is tracked by git"
            exit 1
          fi

          if git ls-files | grep -E "\.pfx$|\.key$|\.pem$"; then
            echo "ERROR: Cryptographic key file is tracked by git"
            exit 1
          fi

          echo "Gitignore is properly configured"
